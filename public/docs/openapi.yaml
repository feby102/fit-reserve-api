                  type: integer
                  description: ''
                  example: 17
                start_time:
                  type: string
                  description: 'Must be a valid date in the format <code>H:i</code>.'
                  example: '01:33'
                date:
                  type: string
                  description: 'Must be a valid date.'
                  example: '2026-04-05T01:33:33'
                hours:
                  type: integer
                  description: 'This field is required when <code>type</code> is <code>daily</code>. Must be at least 1.'
                  example: 45
                  nullable: true
                payment_method:
                  type: string
                  description: ''
                  example: visa
                  enum:
                    - visa
                    - cash
                    - wallet
                type:
                  type: string
                  description: ''
                  example: daily
                  enum:
                    - daily
                    - package
                package_id:
                  type: integer
                  description: 'This field is required when <code>type</code> is <code>package</code>.'
                  example: 17
                  nullable: true
                use_points:
                  type: integer
                  description: 'Must be at least 0.'
                  example: 45
                  nullable: true
                full_name:
                  type: string
                  description: 'للاكاديميات. This field is required when <code>bookable_type</code> is <code>academy</code>. Must not be greater than 255 characters.'
                  example: qeopfuudtdsufvyvddqam
                age:
                  type: integer
                  description: 'This field is required when <code>bookable_type</code> is <code>academy</code>.'
                  example: 17
                parent_id_card:
                  type: string
                  format: binary
                  description: 'Must be an image.'
                  nullable: true
                personal_photo:
                  type: string
                  format: binary
                  description: 'Must be an image.'
                  nullable: true
                coupon_code:
                  type: string
                  description: 'The <code>code</code> of an existing record in the coupons table.'
                  example: consequatur
                  nullable: true
                is_recurring:
                  type: boolean
                  description: للملعب.
                  example: false
                  nullable: true
                recurring_weeks:
                  type: integer
                  description: 'This field is required when <code>is_recurring</code> is <code>true</code>. Must be at least 1. Must not be greater than 4.'
                  example: 2
              required:
                - bookable_type
                - bookable_id
                - start_time
                - date
                - payment_method
                - type
