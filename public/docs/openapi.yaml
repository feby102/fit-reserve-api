          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: vmqeopfuudtdsufvyvddq
                email:
                  type: string
                  description: 'Must be a valid email address.'
                  example: kunde.eloisa@example.com
                password:
                  type: string
                  description: 'Must be at least 6 characters.'
                  example: '4[*UyPJ"}6'
                city:
                  type: string
                  description: ''
                  example: consequatur
                  nullable: true
                role:
                  type: string
                  description: ''
                  example: player
                  enum:
                    - player
                    - coach
                    - vendor
                    - merchant
                    - admin
                    - photographer
                  nullable: true
                referral_code:
                  type: string
                  description: ''
                  example: consequatur
                  nullable: true
                birth_date:
                  type: string
                  description: 'Must be a valid date.'
                  example: '2026-04-05T01:33:32'
                gender:
                  type: string
                  description: ''
                  example: male
                  enum:
                    - male
                    - female
              required:
                - name
                - email
                - password
                - birth_date
                - gender
