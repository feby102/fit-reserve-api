$kind: http-example
request:
  url: "{{baseUrl}}/api/player/:user_id/ratings"
  method: GET
  headers:
    Content-Type: application/json
    Accept: application/json
  pathVariables:
    - key: user_id
      value: consequatur
      description: The ID of the user.
response:
  statusCode: 401
  statusText: OK
  headers:
    cache-control: no-cache, private
    content-type: application/json
    access-control-allow-origin: "*"
  body:
    type: text
    content: '{"message":"Unauthenticated."}'
order: 1000
